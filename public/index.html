<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIP Redesign Review Tool</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'DM Sans', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
    }

    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo { height: 36px; }
    .header h1 { color: white; font-size: 1.2rem; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .reviewer-input {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 25px;
      padding: 10px 16px;
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      width: 160px;
    }
    .reviewer-input::placeholder { color: rgba(255,255,255,0.6); }

    .toolbar {
      background: white;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #ddd;
      flex-wrap: wrap;
      position: sticky;
      top: 68px;
      z-index: 99;
    }

    .page-select {
      padding: 10px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 25px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      min-width: 250px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 25px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-primary { background: #6c5ce7; color: white; }
    .btn-primary:hover { background: #5b4bd4; }
    .btn-secondary { background: #dfe6e9; color: #2d3436; }
    .btn-secondary:hover { background: #b2bec3; }
    .btn-success { background: #00b894; color: white; }
    .btn-success:hover { background: #00a383; }
    .btn-danger { background: #e74c3c; color: white; }

    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .main-container {
      display: flex;
      gap: 0;
      min-height: calc(100vh - 140px);
    }

    .screenshot-area {
      flex: 1;
      padding: 20px;
      overflow: auto;
      background: #e0e0e0;
    }

    .screenshot-wrapper {
      position: relative;
      display: inline-block;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }

    .screenshot-wrapper img {
      display: block;
      max-width: 100%;
    }

    .screenshot-wrapper.pin-mode {
      cursor: crosshair;
    }

    /* Comment Pin Markers */
    .pin-marker {
      position: absolute;
      width: 36px;
      height: 36px;
      background: #e74c3c;
      border: 3px solid white;
      border-radius: 50%;
      color: white;
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: translate(-50%, -50%);
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(0,0,0,0.3);
      transition: transform 0.2s, background 0.2s;
      z-index: 50;
    }

    .pin-marker:hover {
      transform: translate(-50%, -50%) scale(1.15);
    }

    .pin-marker.resolved {
      background: #00b894;
    }

    .pin-marker.selected {
      background: #6c5ce7;
      transform: translate(-50%, -50%) scale(1.2);
      box-shadow: 0 0 0 4px rgba(108,92,231,0.3);
    }

    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 400px;
      color: #666;
    }
    .placeholder-icon { font-size: 4rem; margin-bottom: 16px; }

    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #e0e0e0;
      border-top-color: #6c5ce7;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Comments Panel */
    .comments-panel {
      width: 360px;
      background: white;
      border-left: 1px solid #ddd;
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 140px);
      position: sticky;
      top: 140px;
    }

    .panel-header {
      padding: 16px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-header h2 { font-size: 1rem; }

    .badge {
      background: #6c5ce7;
      color: white;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .filters {
      padding: 10px 16px;
      display: flex;
      gap: 8px;
      border-bottom: 1px solid #eee;
    }

    .filter-btn {
      padding: 6px 12px;
      border: none;
      background: #f0f2f5;
      border-radius: 20px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .filter-btn:hover { background: #e0e0e0; }
    .filter-btn.active { background: #6c5ce7; color: white; }

    .comments-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .comment-card {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.15s;
    }
    .comment-card:hover { background: #f0f2f5; }
    .comment-card.selected { border-color: #6c5ce7; background: #f0ebff; }
    .comment-card.resolved { opacity: 0.6; }

    .comment-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .comment-num {
      background: #e74c3c;
      color: white;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
    }
    .comment-card.resolved .comment-num { background: #00b894; }

    .comment-author { font-weight: 600; font-size: 0.9rem; }
    .comment-text { font-size: 0.85rem; color: #444; line-height: 1.4; margin-bottom: 8px; }
    .comment-meta { font-size: 0.75rem; color: #888; display: flex; justify-content: space-between; align-items: center; }

    .comment-actions button {
      background: none;
      border: none;
      font-size: 0.75rem;
      color: #666;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'DM Sans', sans-serif;
    }
    .comment-actions button:hover { background: #e0e0e0; }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #888;
    }
    .empty-state span { font-size: 2.5rem; display: block; margin-bottom: 10px; }

    /* Add Comment Form */
    .add-form {
      padding: 12px;
      background: #f8f9fa;
      border-top: 1px solid #eee;
      display: none;
    }
    .add-form.active { display: block; }

    .add-form textarea {
      width: 100%;
      padding: 10px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      resize: none;
      height: 80px;
      margin-bottom: 10px;
    }
    .add-form textarea:focus { outline: none; border-color: #6c5ce7; }

    /* Mobile */
    @media (max-width: 768px) {
      .header h1 { font-size: 1rem; }
      .main-container { flex-direction: column; }
      .comments-panel { 
        width: 100%; 
        max-height: none;
        position: relative;
        top: 0;
      }
      .screenshot-area { padding: 10px; }
      .toolbar { gap: 8px; }
      .page-select { min-width: 100%; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <img src="logo.png" alt="VIP" class="logo">
      <h1>Redesign Review Tool</h1>
    </div>
    <div class="header-right">
      <input type="text" id="reviewerName" class="reviewer-input" placeholder="Your name">
    </div>
  </header>

  <div class="toolbar">
    <select id="pageSelect" class="page-select">
      <option value="">-- Select a page --</option>
    </select>
    <button id="loadBtn" class="btn btn-primary">Load Screenshot</button>
    <button id="pinBtn" class="btn btn-success" disabled>📍 Add Comment</button>
    <button id="captureAllBtn" class="btn btn-secondary">📸 Capture All Pages</button>
  </div>

  <div class="main-container">
    <div class="screenshot-area" id="screenshotArea">
      <div class="placeholder" id="placeholder">
        <span class="placeholder-icon">🖼️</span>
        <p>Select a page and click "Load Screenshot"</p>
      </div>
      <div class="screenshot-wrapper" id="screenshotWrapper" style="display:none;">
        <img id="screenshotImg" src="" alt="Page screenshot">
      </div>
    </div>

    <aside class="comments-panel">
      <div class="panel-header">
        <h2>Comments</h2>
        <span class="badge" id="commentCount">0</span>
      </div>
      <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="open">Open</button>
        <button class="filter-btn" data-filter="resolved">Resolved</button>
      </div>
      <div class="comments-list" id="commentsList">
        <div class="empty-state">
          <span>💬</span>
          <p>No comments yet</p>
        </div>
      </div>
      <div class="add-form" id="addForm">
        <textarea id="commentInput" placeholder="Write your feedback..."></textarea>
        <div style="display:flex;gap:8px;justify-content:flex-end;">
          <button class="btn btn-secondary" id="cancelBtn">Cancel</button>
          <button class="btn btn-primary" id="submitBtn">Submit</button>
        </div>
      </div>
    </aside>
  </div>

  <div class="loading-overlay" id="loading" style="display:none;">
    <div class="spinner"></div>
    <p style="margin-top:16px;" id="loadingText">Loading...</p>
  </div>

  <script>
    const API = window.location.pathname.replace(/\/$/, '') || '';
    
    let pages = [];
    let currentUrl = '';
    let comments = [];
    let pinMode = false;
    let pendingPin = null;
    let selectedId = null;
    let filter = 'all';

    const pageSelect = document.getElementById('pageSelect');
    const loadBtn = document.getElementById('loadBtn');
    const pinBtn = document.getElementById('pinBtn');
    const captureAllBtn = document.getElementById('captureAllBtn');
    const screenshotWrapper = document.getElementById('screenshotWrapper');
    const screenshotImg = document.getElementById('screenshotImg');
    const placeholder = document.getElementById('placeholder');
    const loading = document.getElementById('loading');
    const loadingText = document.getElementById('loadingText');
    const commentsList = document.getElementById('commentsList');
    const commentCount = document.getElementById('commentCount');
    const addForm = document.getElementById('addForm');
    const commentInput = document.getElementById('commentInput');
    const submitBtn = document.getElementById('submitBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const reviewerName = document.getElementById('reviewerName');
    const filterBtns = document.querySelectorAll('.filter-btn');

    // Load saved name
    reviewerName.value = localStorage.getItem('reviewerName') || '';
    reviewerName.addEventListener('change', () => localStorage.setItem('reviewerName', reviewerName.value));

    // Load pages list
    async function loadPages() {
      const res = await fetch(`${API}/api/pages`);
      pages = await res.json();
      
      pageSelect.innerHTML = '<option value="">-- Select a page --</option>';
      pages.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.url;
        opt.textContent = p.name + (p.hasScreenshot ? '' : ' (no screenshot)');
        if (p.commentCount > 0) opt.textContent += ` [${p.commentCount}]`;
        pageSelect.appendChild(opt);
      });
    }

    // Load screenshot
    loadBtn.addEventListener('click', loadScreenshot);
    pageSelect.addEventListener('change', () => { if (pageSelect.value) loadScreenshot(); });

    async function loadScreenshot() {
      const url = pageSelect.value;
      if (!url) return;

      currentUrl = url;
      loading.style.display = 'flex';
      loadingText.textContent = 'Loading screenshot...';

      try {
        const res = await fetch(`${API}/api/screenshot`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });
        const data = await res.json();

        if (data.error) throw new Error(data.error);

        screenshotImg.src = data.screenshot + '?t=' + Date.now();
        screenshotImg.onload = () => {
          placeholder.style.display = 'none';
          screenshotWrapper.style.display = 'inline-block';
          pinBtn.disabled = false;
          loading.style.display = 'none';
          loadComments();
        };
      } catch (err) {
        alert('Error: ' + err.message);
        loading.style.display = 'none';
      }
    }

    // Capture all pages
    captureAllBtn.addEventListener('click', async () => {
      if (!confirm('Capture screenshots of all pages? This may take a few minutes.')) return;
      
      loading.style.display = 'flex';
      loadingText.textContent = 'Capturing all pages...';

      try {
        const res = await fetch(`${API}/api/screenshot/all`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ refresh: false })
        });
        const data = await res.json();
        alert('Done! Captured ' + data.results.filter(r => r.status === 'captured').length + ' new screenshots.');
        loadPages();
      } catch (err) {
        alert('Error: ' + err.message);
      } finally {
        loading.style.display = 'none';
      }
    });

    // Pin mode
    pinBtn.addEventListener('click', () => {
      pinMode = !pinMode;
      pinBtn.classList.toggle('btn-danger', pinMode);
      pinBtn.textContent = pinMode ? '❌ Cancel' : '📍 Add Comment';
      screenshotWrapper.classList.toggle('pin-mode', pinMode);
    });

    // Click on screenshot to place pin
    screenshotWrapper.addEventListener('click', (e) => {
      if (!pinMode) return;
      if (e.target.classList.contains('pin-marker')) return;

      const rect = screenshotImg.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width) * 100;
      const y = ((e.clientY - rect.top) / rect.height) * 100;

      pendingPin = { x, y };
      pinMode = false;
      pinBtn.classList.remove('btn-danger');
      pinBtn.textContent = '📍 Add Comment';
      screenshotWrapper.classList.remove('pin-mode');

      addForm.classList.add('active');
      commentInput.focus();
    });

    // Cancel comment
    cancelBtn.addEventListener('click', () => {
      addForm.classList.remove('active');
      commentInput.value = '';
      pendingPin = null;
    });

    // Submit comment
    submitBtn.addEventListener('click', submitComment);

    async function submitComment() {
      const text = commentInput.value.trim();
      if (!text) return alert('Please enter a comment');
      if (!pendingPin) return alert('Please click on the screenshot first');

      const author = reviewerName.value.trim() || 'Anonymous';

      try {
        await fetch(`${API}/api/comments`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            url: currentUrl,
            comment: text,
            author,
            x: pendingPin.x,
            y: pendingPin.y
          })
        });

        addForm.classList.remove('active');
        commentInput.value = '';
        pendingPin = null;
        loadComments();
        loadPages(); // Refresh counts
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    // Load comments
    async function loadComments() {
      if (!currentUrl) return;

      const res = await fetch(`${API}/api/comments?url=${encodeURIComponent(currentUrl)}`);
      comments = await res.json();
      renderPins();
      renderComments();
    }

    // Render pins on screenshot
    function renderPins() {
      screenshotWrapper.querySelectorAll('.pin-marker').forEach(p => p.remove());

      comments.forEach((c, i) => {
        if (c.x == null) return;

        const pin = document.createElement('div');
        pin.className = 'pin-marker' + (c.resolved ? ' resolved' : '') + (c.id === selectedId ? ' selected' : '');
        pin.style.left = c.x + '%';
        pin.style.top = c.y + '%';
        pin.textContent = i + 1;
        pin.onclick = (e) => {
          e.stopPropagation();
          selectComment(c.id);
        };
        screenshotWrapper.appendChild(pin);
      });
    }

    // Render comments list
    function renderComments() {
      const filtered = comments.filter(c => {
        if (filter === 'open') return !c.resolved;
        if (filter === 'resolved') return c.resolved;
        return true;
      });

      commentCount.textContent = comments.length;

      if (filtered.length === 0) {
        commentsList.innerHTML = '<div class="empty-state"><span>💬</span><p>No comments yet</p></div>';
        return;
      }

      commentsList.innerHTML = filtered.map(c => {
        const num = comments.indexOf(c) + 1;
        const date = new Date(c.timestamp).toLocaleString();
        return `
          <div class="comment-card ${c.resolved ? 'resolved' : ''} ${c.id === selectedId ? 'selected' : ''}"
               onclick="selectComment('${c.id}')">
            <div class="comment-header">
              <span class="comment-num">${num}</span>
              <span class="comment-author">${escapeHtml(c.author)}</span>
            </div>
            <p class="comment-text">${escapeHtml(c.comment)}</p>
            <div class="comment-meta">
              <span>${date}</span>
              <div class="comment-actions">
                <button onclick="event.stopPropagation();toggleResolve('${c.id}',${!c.resolved})">${c.resolved ? '↩ Reopen' : '✓ Resolve'}</button>
                <button onclick="event.stopPropagation();deleteComment('${c.id}')">🗑</button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    window.selectComment = function(id) {
      selectedId = selectedId === id ? null : id;
      renderPins();
      renderComments();
      
      if (selectedId) {
        const pin = screenshotWrapper.querySelector('.pin-marker.selected');
        if (pin) pin.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    };

    window.toggleResolve = async function(id, resolved) {
      await fetch(`${API}/api/comments/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: currentUrl, resolved })
      });
      loadComments();
    };

    window.deleteComment = async function(id) {
      if (!confirm('Delete this comment?')) return;
      await fetch(`${API}/api/comments/${id}?url=${encodeURIComponent(currentUrl)}`, { method: 'DELETE' });
      loadComments();
      loadPages();
    };

    // Filters
    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filter = btn.dataset.filter;
        renderComments();
      });
    });

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Initialize
    loadPages();
  </script>
</body>
</html>
